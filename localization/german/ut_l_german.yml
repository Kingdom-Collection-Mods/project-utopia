 ut_international_diplomatic_power_bloc_merge_desc: "Ein Angebot zur Vereinigung der Machtblöcke. Wenn akzeptiert, werden der Anführer und alle Mitglieder des Machtblocks des Zielstaates unserem eigenen Machtblock beitreten. Sie werden nur bleiben, wenn die Akzeptanz, dem Machtblock beizutreten, hoch genug ist."
 ut_international_diplomatic_power_bloc_merge_effects_desc: "• Ein Abkommen, unter dem alle Machtblock-Mitglieder dem anderen Block beitreten. Durch den demokratischen Neuer Aufbruch freigeschaltet."
