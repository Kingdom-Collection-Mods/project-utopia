 interest_group_ig_urbanists_pop_attraction_mult: "Pop-Anziehung ($ig_variant_urbanists$)"
 interest_group_ig_urbanists_pop_attraction_mult_desc: "Ein Bonus oder Abzug darauf, wie sehr Pops von der [concept_interest_group] „$ig_variant_urbanists$“ angezogen werden."

 ideology_urbanist_liberalist: "Urban-liberale Ideologie"
 ideology_urbanist_power_base: "Weltbürgerlich"
 ideology_urbanist_power_base_desc: "Weltbürgerlich Ideologien setzen auf globale Vernetzung, Inklusivität und die Förderung von Menschenrechten. Sie befürworten offene Grenzen, Multikulturalismus und eine säkulare Regierungsführung ohne religiösen Einfluss."
 ideology_urbanist_economy_base: "Rationalisten"
 ideology_urbanist_economy_base_desc: "Rationalistische Ideologien favorisieren die Regierung durch Experten und die effiziente Verwaltung von Staat und Gesellschaft. Sie setzen auf wissenschaftlich fundierte Entscheidungen und unterstützen Bildung, Technologie und öffentliche Dienstleistungen."
 ideology_urbanist_human_rights_base: "Humanisten"
 ideology_urbanist_human_rights_base_desc: "Humanistische Ideologien konzentrieren sich auf Gleichheit, soziale Gerechtigkeit und den Schutz der individuellen Rechte. Sie lehnen Sklaverei und Ausbeutung ab und setzen sich für starke soziale Sicherheitsnetze ein."
 ut_ideology_environmentalist_leader: "Ökologisch"
 ut_ideology_environmentalist_leader_desc: "Ökologistische Ideologien priorisieren den Schutz der Umwelt und nachhaltige Entwicklung. Sie setzen sich für Maßnahmen ein, die den Klimawandel bekämpfen, natürliche Ressourcen schonen und das ökologische Gleichgewicht fördern."
 ut_ideology_environmentalist_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_environmentalist_leader').GetName] [concept_ideology]"

 ut_ideology_cosmopolitan: "Kosmopolitisch"
 ut_ideology_cosmopolitan_desc: "Kosmopolitische Ideologien betonen die globale Zusammenarbeit, kulturelle Vielfalt und die Förderung von Menschenrechten. Sie befürworten offene Grenzen, Multikulturalismus und eine säkulare Regierungsführung ohne religiösen Einfluss."
 ut_ideology_cosmopolitan_leader: "Kosmopolitisch"
 ut_ideology_cosmopolitan_leader_desc: "Kosmopolitische Ideologien betonen die globale Zusammenarbeit, kulturelle Vielfalt und die Förderung von Menschenrechten. Sie befürworten offene Grenzen, Multikulturalismus und eine säkulare Regierungsführung ohne religiösen Einfluss."
 ut_ideology_cosmopolitan_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_cosmopolitan_leader').GetName] [concept_ideology]"

 ut_ideology_autocratic_leader: "Autokratisch"
 ut_ideology_autocratic_leader_desc: "Autokratische Ideologien priorisieren eine starke, zentralisierte Autorität und Ordnung. Sie betonen oft Tradition, Hierarchie und nationale Einheit und befürworten begrenzte politische Freiheiten zugunsten von Stabilität und Kontrolle."
 ut_ideology_autocratic_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_autocratic_leader').GetName] [concept_ideology]"
 ut_ideology_national_socialist_leader: "Faschistischer Totalitarist"
 ut_ideology_national_socialist_leader_desc: "Dieser Anführer ist ein Totalitarist, der versucht, absolute Kontrolle über den Staat und die Gesellschaft zu erlangen, und strikte Gehorsamkeit und Einheit unter einer einzigen Ideologie erzwingt. Er glaubt an die Unterwerfung des individuellen Willens unter das Kollektiv und die Beseitigung von Dissens zur Wahrung von Ordnung und Autorität. Wahrscheinlicher bei [concept_ut_nd_fascist_core] oder [concept_ut_nd_autocrat_core].\n\n#i Historischer Kontext:\nSpiegelt die totalitären Diktaturen der 1940er in Nazi-Deutschland, dem faschistischen Italien und Japan wider - die absolute Kontrolle über Staat und Gesellschaft anstrebten.#!"
 ut_ideology_national_socialist_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_national_socialist_leader').GetName] [concept_ideology]"
 ut_ideology_totalitarian_communist_leader: "Kommunistischer Totalitarist"
 ut_ideology_totalitarian_communist_leader_desc: "Dieser Anführer ist ein Totalist, der versucht, absolute Kontrolle über den Staat und die Gesellschaft zu erlangen, und strikte Gehorsamkeit und Einheit unter einer einzigen Ideologie erzwingt. Er glaubt an die Unterwerfung des individuellen Willens unter das Kollektiv und die Beseitigung von Dissens zur Wahrung von Ordnung und Autorität. Wahrscheinlicher bei autoritärem [concept_ut_nd_communist_core].\n\n#i Historischer Kontext:\nSpiegelt die totalitären Diktaturen der 1940er in der Sowjetunion und dem maoistischen China wider - die absolute Kontrolle über Staat und Gesellschaft anstrebten.#!"
 ut_ideology_totalitarian_communist_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_totalitarian_communist_leader').GetName] [concept_ideology]"

 ut_ideology_economical_corporatist_leader: "Ökonomischer Kooperatismus"
 ut_ideology_economical_corporatist_leader_desc: "Ökonomischer Kooperatismus betont die Rolle des Staates bei der Steuerung der Wirtschaft, während ein starker Unternehmenssektor aufrechterhalten wird. Er plädiert für eine Zusammenarbeit zwischen Regierung und Unternehmen, um wirtschaftliches Wachstum und soziale Stabilität zu erreichen."
 ut_ideology_economical_corporatist_leader_unlock_tt: "Verfügbare [GetIdeology('ut_ideology_economical_corporatist_leader').GetName] [concept_ideology]"

 ideology_liberal_democratic: "Liberal-Demokratisch"
 ideology_liberal_democratic_desc: "#lore Diese Gruppe setzt sich für individuelle Freiheiten, bürgerliche Rechte und demokratische Regierungsführung ein. Sie befürworten freie Märkte, begrenzte staatliche Eingriffe und den Schutz persönlicher Freiheiten. Ersetzt [GetIdeology('ideology_liberal').GetName]. #!"
 ideology_moralist_democratic: "Moralisch-Demokratisch"
 ideology_moralist_democratic_desc: "#lore This group emphasizes individual freedoms, civil rights, and democratic governance. They advocate for a balanced approach to social and economic policies, promoting both personal liberty and social responsibility. Replaces [GetIdeology('ideology_moralist').GetName]. #!"
 ideology_plutocratic_democratic: "Elitär"
 ideology_plutocratic_democratic_desc: "#lore This group believes that society should be governed by a wealthy elite who are best equipped to make decisions for the common good. They often prioritize economic growth and stability over social equality. Replaces [GetIdeology('ideology_plutocratic').GetName]. [concept_ut_nd_democrat_core] variation.#!"
 ideology_plutocratic_communist: "Elitär"
 ideology_plutocratic_communist_desc: "#lore Diese Gruppe glaubt, dass die Gesellschaft von einer wohlhabenden Elite regiert werden sollte, die am besten in der Lage ist, Entscheidungen zum Wohle der Allgemeinheit zu treffen. Sie priorisieren oft wirtschaftliches Wachstum und Stabilität über soziale Gleichheit. Ersetzt [GetIdeology('ideology_plutocratic').GetName]. [concept_ut_nd_communist_core] Variante.#!"
 ideology_plutocratic_alternative: "Elitär (Alternative)"
 ideology_plutocratic_alternative_desc: "#lore Diese Gruppe glaubt, dass die Gesellschaft von einer wohlhabenden Elite regiert werden sollte, die am besten in der Lage ist, Entscheidungen zum Wohle der Allgemeinheit zu treffen. Sie priorisieren oft wirtschaftliches Wachstum und Stabilität über soziale Gleichheit. Replaces [GetIdeology('ideology_plutocratic').GetName]. #!"
 ideology_republican_communist: "Technokraten"
 ideology_republican_communist_desc: "#lore Diese Gruppe glaubt an Regierung durch Experten und Technokraten und betont Effizienz und rationale Entscheidungsfindung. Ersetzt [GetIdeology('ideology_republican').GetName]. #r Geht verloren, wenn $new_dawn_phase_2_mod$ scheitert.#!"
 ideology_reactionary_democratic: "Konservativ"
 ideology_reactionary_democratic_desc: "#lore This group values tradition, social stability, and gradual change. They often support established institutions and may resist rapid social or political reforms. Replaces [GetIdeology('ideology_reactionary').GetName].  [concept_ut_nd_democrat_core] variation.#!"
 ideology_reactionary_communist: "Konservativ"
 ideology_reactionary_communist_desc: "#lore Diese Gruppe schätzt Tradition, soziale Stabilität und schrittweisen Wandel. Sie unterstützen oft etablierte Institutionen und können schnellen sozialen oder politischen Reformen widerstehen. Ersetzt [GetIdeology('ideology_reactionary').GetName]. [concept_ut_nd_communist_core] Variante.#!"
 ut_ideology_reactionary_alternative: "Konservativ"
 ut_ideology_reactionary_alternative_desc: "#lore Diese Gruppe schätzt Tradition, soziale Stabilität und schrittweisen Wandel. Sie unterstützen oft etablierte Institutionen und können schnellen sozialen oder politischen Reformen widerstehen. Ersetzt [GetIdeology('ideology_reactionary').GetName]. #!"
 ut_ideology_laissez_faire: "Laissez-Faire (Modern)"
 ut_ideology_laissez_faire_desc: "#lore Diese Gruppe glaubt an den freien Fluss von Handel und Arbeitskräften und bevorzugt das Urteil der Märkte gegenüber dem der Regierungen. Ersetzt [GetIdeology('ideology_laissez_faire').GetName].#!"

 ideology_jingoist_democratic: "Sicherheitspolitik"
 ideology_jingoist_democratic_desc: "#lore This group prioritizes national security, strong defense, and patriotism. They advocate for a robust military and may support interventionist foreign policies to protect national interests. Replaces [GetIdeology('ideology_jingoist').GetName]. #!"

 ideology_socialist_democratic: "Sozialdemokratisch"
 ideology_socialist_democratic_desc: "#lore This group advocates for social justice, economic equality, and the protection of workers' rights. They support a mixed economy with significant government intervention to ensure social welfare and reduce inequality. Replaces [GetIdeology('ideology_socialist').GetName]. #!"

 ut_ideology_laissez_faire_democratic: "Liberal"
 ut_ideology_laissez_faire_democratic_desc: "#lore Diese Gruppe glaubt an den freien Fluss von Handel und Arbeitskräften und bevorzugt das Urteil der Märkte gegenüber dem der Regierungen. Ersetzt [GetIdeology('ideology_laissez_faire').GetName]. [concept_ut_nd_democrat_core] Variante.#!"

 ut_ideology_laissez_faire_democratic_neoliberal: "Neoliberal"
 ut_ideology_laissez_faire_democratic_neoliberal_desc: "#lore Diese Gruppe glaubt an den freien Fluss von Handel und Arbeitskräften und bevorzugt das Urteil der Märkte gegenüber dem der Regierungen. Ersetzt [GetIdeology('ideology_laissez_faire').GetName]. [concept_ut_nd_democrat_core] Variante.#!"

 ut_ideology_laissez_faire_authoritarian: "Plutokratischer Liberalismus"
 ut_ideology_laissez_faire_authoritarian_desc: "#lore Diese Gruppe glaubt an den freien Fluss von Handel und Arbeitskräften und bevorzugt das Urteil der Märkte gegenüber dem der Regierungen. Ersetzt [GetIdeology('ideology_laissez_faire').GetName]. [concept_ut_nd_autocrat_core] Variante.#!. #r Geht verloren, wenn $new_dawn_phase_2_mod$ scheitert.#!"

 ideology_patriotic_fascist: "Nationalist"
 ideology_patriotic_fascist_desc: "#lore Diese Gruppe betont eine starke nationale Identität, Patriotismus und oft autoritäre Regierungsführung. Sie priorisieren nationale Einheit und können aggressive Außenpolitiken unterstützen. Ersetzt [GetIdeology('ideology_patriotic').GetName]. #!"
 ideology_patriotic_communist_national: "Anti-Imperialistisch"
 ideology_patriotic_communist_national_desc: "#lore Diese Gruppe betont eine starke nationale Identität, Patriotismus und oft autoritäre Regierungsführung. Sie priorisieren nationale Einheit und können aggressive Außenpolitiken unterstützen. Ersetzt [GetIdeology('ideology_patriotic').GetName]. [concept_ut_nd_communist_core] variation.#! #r Lost if $new_dawn_phase_2_mod$ fails.#!"
 ideology_patriotic_communist_international: "Internationalistisch"
 ideology_patriotic_communist_international_desc: "#lore Diese Gruppe betont eine starke nationale Identität, Patriotismus und oft autoritäre Regierungsführung. Sie priorisieren nationale Einheit und können aggressive Außenpolitiken unterstützen. Ersetzt [GetIdeology('ideology_patriotic').GetName]. [concept_ut_nd_communist_core] variation.#!  #r Lost if $new_dawn_phase_2_mod$ fails.#!"
 ideology_patriotic_democratic: "Bürgerlicher Patriotismus"
 ideology_patriotic_democratic_desc: "#lore Diese Gruppe betont eine starke nationale Identität, Patriotismus und oft autoritäre Regierungsführung. Sie priorisieren nationale Einheit und können aggressive Außenpolitiken unterstützen. Ersetzt [GetIdeology('ideology_patriotic').GetName]. [concept_ut_nd_democrat_core] variation.#!"

 ig_trait_urbanist_loyal: "Leistungsgesellschaft"
 ig_trait_urbanist_loyal_desc: "Diese Gruppe setzt sich für die freie Bewegung von Menschen über Grenzen hinweg ein, da sie glaubt, dass dies den kulturellen Austausch und wirtschaftliche Chancen fördert. Sie lehnen restriktive Einwanderungspolitiken ab und betonen die internationale Zusammenarbeit."
 ig_trait_urbanist_happy: "Bildungszugang"
 ig_trait_urbanist_happy_desc: "Diese Gruppe setzt sich für eine Gesellschaft ein, die von Forschung, Innovation und messbarer Leistung angetrieben wird. Sie glauben, dass kontinuierliche Verbesserung und wissenschaftlicher Fortschritt der Schlüssel zum nationalen Erfolg sind."
 ig_trait_urbanist_unhappy: "Diskriminierung"
