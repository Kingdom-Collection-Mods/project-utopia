 lawgroup_environment_protection: "Umweltschutz"
 lawgroup_environment_protection_desc: "Gesetze und Institutionen, die die Umwelt schützen, Nachhaltigkeit fördern und das ökologische Gleichgewicht sicherstellen."
 lawgroup_food_safety: "Lebensmittelsicherheit"
 lawgroup_food_safety_desc: "Gesetze und Institutionen, die die Lebensmittelsicherheit, Hygiene und Qualitätsstandards in der Lebensmittelproduktion und -verteilung gewährleisten."

 ut_law_monarchy_democratic: "Konstitutionelle Monarchie"
 ut_law_monarchy_democratic_desc: "Ein System, in dem die Macht des Monarchen keine wirkliche politische Macht hat und ein gewähltes Parlament die Autorität innehat."

 ut_law_monarchy_autocratic: "Absolute Monarchie"
 ut_law_monarchy_autocratic_desc: "Ein System, in dem der Monarch die höchste Autorität innehat."

 ut_law_monarchy_corporate_state: "Oberster Anführer"
 ut_law_monarchy_corporate_state_desc: "Ein System, in dem ein einzelner Führer absolute Macht hat, oft unterstützt von einer Unternehmens- oder Parteistruktur."

 ut_law_council_presidium: "Rätepräsidium"
 ut_law_council_presidium_desc: "Ein kollektives Führungsorgan, das die Macht unter einer ausgewählten Gruppe teilt, oft innerhalb einer Partei oder Regierungsstruktur."

 ut_law_international_council: "Internationale Räterepublik"
 ut_law_international_council_desc: "Ein supranationales Regierungsorgan, das mehrere Nationen überwacht und Zusammenarbeit sowie gemeinsame Regierungsführung fördert."

 ut_law_subjecthood_fascist: "Administrative Gehorsamkeit"
 ut_law_subjecthood_fascist_desc: "All eroberten Völker sind Subjekte der führenden Nation."

 ut_communist_enact_law_variants: "Gesetz-Varianten erlassen"
 ut_communist_enact_law_variants_desc: "Erlaubt den Erlass besonderer Gesetzesvarianten, die

 law_social_market_economy: "Soziale Marktwirtschaft" 
 law_social_market_economy_desc: "Eine regulierte Marktwirtschaft, die freien Wettbewerb mit sozialer Absicherung verbindet, um Wohlstand und gesellschaftlichen Ausgleich zu fördern."
 law_free_market_economy: "Freie Marktwirtschaft"
 law_free_market_economy_desc: "Ein entfesselter Kapitalismus, in dem Preise und Produktion ausschließlich durch Angebot und Nachfrage bei minimaler staatlicher Regulierung bestimmt werden."
 law_state_capitalism_economy: "Staatskapitalismus"
 law_state_capitalism_economy_desc: "Ein Wirtschaftssystem, in dem der Staat die Kontrolle über Schlüsselindustrien und Ressourcen ausübt, um nationale Interessen zu fördern und wirtschaftliche Stabilität zu gewährleisten."
 law_corporate_economy: "Korporatismus"
 law_corporate_economy_desc: "Ein System, in dem Unternehmen und Staat eng zusammenarbeiten, um wirtschaftliche Interessen zu fördern und soziale Stabilität zu gewährleisten."
 ut_law_tax_code: "Steuergesetz"
 ut_law_tax_code_desc: "Ein umfassendes Steuersystem, das zusätzliche Steuererlassmöglichkeiten bietet."
 ut_law_tax_code_effect_tt: "Schaltet weitere Steuererlasse frei."
 ut_law_tax_code_amend: "Steuergesetz ändern"
 ut_law_tax_code_amend_desc: "Ändern Sie den Steuergesetz, um die individuellen Steuersätze zu erhöhen oder zu senken."
 ut_tax_code_changed: "Steuergesetz geändert"
 ut_tax_code_income_tax_raised: "Einkommensteuer erhöht"
 ut_tax_code_income_tax_lowered: "Einkommensteuer gesenkt"
 ut_tax_code_consumption_tax_raised: "Verbrauchsteuer erhöht"
 ut_tax_code_consumption_tax_lowered: "Verbrauchsteuer gesenkt"
 ut_tax_code_dividend_tax_raised: "Dividendsteuer erhöht"
 ut_tax_code_dividend_tax_lowered: "Dividendsteuer gesenkt"

 ut_private_construction_amend: "Improve Private Construction"
 ut_private_construction_amend_desc: "Allows private companies to construct buildings, potentially increasing efficiency but also raising costs."
 ut_private_construction_changed: "Private Construction Changed"
 ut_private_construction_raised_mod: "Private Construction Increased"
 ut_private_construction_lower: "Decrease Private Construction"

 ut_law_private_health_research: "Private Gesundheitsforschung"
 ut_law_private_health_research_desc: "Ermöglicht es privaten Unternehmen, Gesundheitsforschung durchzuführen und medizinische Behandlungen zu entwickeln, was potenziell zu Innovationen führt, aber auch ethische Bedenken aufwirft."
 ut_law_public_health_research: "Öffentliche Gesundheitsforschung"
 ut_law_public_health_research_desc: "Staatlich finanzierte Forschungseinrichtungen, die sich auf öffentliche Gesundheitsfragen konzentrieren und sicherstellen, dass medizinische Fortschritte der gesamten Bevölkerung zugutekommen."

 law_free_trade_union: "Freihandelsblock"
 law_free_trade_union_desc: "Ein Staatenbund, der interne Handelsbarrieren abschafft und eine gemeinsame Zollpolitik zur Förderung wirtschaftlicher Interessen verfolgt."
 law_protectionism_union: "Protektionistischer Block"
 law_protectionism_union_desc: "Ein Zusammenschluss von Nationen, die durch kollektive Zölle und Handelsbeschränkungen heimische Industrien vor ausländischer Konkurrenz schützen."
 law_compulsory_secondary_school: "Sekundarschulpflicht"
 law_compulsory_secondary_school_desc: "Staatlich verpflichtende Sekundarbildung, um allen Bürgern grundlegende Qualifikationen für gesellschaftliche Teilhabe zu sichern."
 law_compulsory_tertiary_school: "Hochschulpflicht"
 law_compulsory_tertiary_school_desc: "Verpflichtende Hochschulbildung zur Förderung von Fachwissen und technologischem Fortschritt."
 law_public_university: "Öffentliche Universitäten"
 law_public_university_desc: "Staatlich finanzierte Hochschulen, die Bildung unabhängig von sozialer Herkunft zugänglich machen und Forschung fördern."
 law_private_universities: "Private Universitäten"
 law_private_universities_desc: ""
 law_task_forces: "Einsatzgruppen"
 law_task_forces_desc: "Spezialisierte Einheiten zur schnellen Krisenbewältigung oder Verteidigung des Landes."
 law_neo_ethno_state: "Neo-Ethnostaat"
 law_neo_ethno_state_desc: "Ein nationalistisches Regime, das ethnische Homogenität durch restriktive Einwanderungsgesetze und kulturelle Assimilation erzwingt."
 EFFECTS_ON_ACCEPTANCE_law_neo_ethno_state: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Pops mit niedrigen Akzeptanzwerten erwartet ein hartes Leben, während Pops mit höherem Status gedeihen#!#!"
 law_multicultural_globalism: "Kosmopolitismus"
 law_multicultural_globalism_desc: "Eine offene Gesellschaft, die kulturelle Vielfalt und internationale Zusammenarbeit hoch bewertet."
 EFFECTS_ON_ACCEPTANCE_law_multicultural_globalism: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Pops führen ähnliche Leben mit wenigen abträglichen Folgen, auch wenn sie nicht akzeptiert sind#!#!"
 EFFECTS_ON_ACCEPTANCE_ut_law_subjecthood_fascist: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Bevölkerungsgruppen außerhalb ihrer Heimat haben niedrige Akzeptanzwerte und ein hartes Leben, während Bevölkerungsgruppen mit höherem Status ebenfalls unterdrückt werden.#!"
 law_equal_rights_for_women: "Gleichberechtigung"
 law_equal_rights_for_women_desc: "Gesetzliche Gleichstellung von Frauen in Bildung, Beruf und Politik zur Beseitigung geschlechtsspezifischer Diskriminierung."
 law_affirmative_equality: "Gleichstellungsauftrag"
 law_affirmative_equality_desc: "Aktive Quotenregelungen und Förderprogramme, um historische Benachteiligungen zwischen den Geschlechtern auszugleichen."
 law_privatized_bureaucrats: "Privatisierte Verwaltung"
 law_privatized_bureaucrats_desc: "Die Auslagerung staatlicher Verwaltungsaufgaben an private Unternehmen, um Effizienz zu steigern und Kosten zu senken."
 law_no_environment_protection: "Keine Umweltschutzgesetze"
 law_no_environment_protection_desc: "Industrielle Ausbeutung natürlicher Ressourcen ohne Rücksicht auf ökologische Folgen oder Nachhaltigkeit."
 law_environment_protection_institute: "Umweltschutzgesetze"
 law_environment_protection_institute_desc: "Grundlegende gesetzliche Vorgaben zur Begrenzung von Umweltverschmutzung und Erhaltung natürlicher Lebensräume."
 law_environment_protection_institute_two: "Umweltschutzamt"
 law_environment_protection_institute_two_desc: "Eine behördliche Institution zur Überwachung und Durchsetzung von Umweltvorschriften sowie zur Erforschung ökologischer Risiken."
 law_environment_protection_institute_three: "Umweltschutzregulierungen"
 law_environment_protection_institute_three_desc: "Umfassender rechtlicher Rahmen zum Schutz der Umwelt, zur Förderung der Nachhaltigkeit und zur Sicherstellung des ökologischen Gleichgewichts."
 law_food_safety_protection_institute_two: "Lebensmittelbehörde"
 law_food_safety_protection_institute_two_desc: "Eine staatliche Behörde, die Hygienestandards und Sicherheitsvorschriften in der Lebensmittelproduktion kontrolliert."
 law_no_food_safety_protection: "Keine Lebensmittelsicherheit"
 law_no_food_safety_protection_desc: "Fehlende Kontrollen bei der Lebensmittelherstellung, was zu gesundheitlichen Risiken für die Bevölkerung führen kann."
 law_food_safety_protection_institute: "Lebensmittelstandards"
 law_food_safety_protection_institute_desc: "Gesetzlich festgelegte Mindestanforderungen an Hygiene und Qualität, um sichere Lebensmittel für Verbraucher zu gewährleisten."
 law_demobilized: "Demobilisiert"
 law_demobilized_desc: "Die massive Verkleinerung der Streitkräfte und die Rückführung von Ressourcen in die zivile Wirtschaft."
 law_private_pension: "Private Rente"
 law_private_pension_desc: ""
 law_ut_disability_insurance: "Arbeitsunfähigkeitsversicherung"
 law_ut_disability_insurance_desc: "Finanzielle Unterstützung zur Integration von Personen, die aufgrund von Behinderungen nicht arbeiten können, in die Gesellschaft."
 law_ut_minimum_wage: "Mindestlohn"
 law_ut_minimum_wage_desc: ""
 law_decolonization: "Dekolonisierung"
 law_decolonization_desc: "Dieses Land fördert aktiv die Unabhängigkeit seiner ehemaligen Kolonien."
 law_decolonization_effect_tt: "Jede Kolonie wird unabhängig. Wenn auf dem kommunistischen Weg, werden sie dem Machtblock beitreten."
 law_registration_process: "Qualifizierte Migration"
 law_registration_process_desc: "Das Land hat ein geregeltes Einwanderungssystem, erst nach erfolgreicher Registrierung erhalten Einwanderer Aufenthalts- und Arbeitsrechte."

 lawgroup_lgbt_rights: "Sexualität - In Arbeit"
 lawgroup_lgbt_rights_desc: "Platzhalter"
 law_mass_surveillance: "Platzhalter"
 law_mass_surveillance_desc: "Platzhalter"
 law_lgbt_rights_0: "Gesetzliches Schweigen"
 law_lgbt_rights_0_desc: "Das Gesetz ist still, aber die Erwartungen sind es nicht. Gleichgeschlechtliche Wünsche leben im Schatten; einige Menschen passen sich an, einige leben im Verborgenen, andere treffen sich diskret, und Familien oder Geistliche - nicht die Gerichte - übernehmen die meiste Unterdrückung."
 law_lgbt_rights_1: "Kriminalisiert"
 law_lgbt_rights_1_desc: "Der Staat verbietet gleichgeschlechtliche Beziehungen und nennt sie \"Sodomie\". Razzien, Prozesse und Erpressung treiben Gemeinschaften in den Untergrund, während Skandal und Angst den Rest erledigen."
 law_lgbt_rights_2: "Entkriminalisiert"
 law_lgbt_rights_2_desc: "Einvernehmliche Erwachsene werden nicht mehr strafrechtlich verfolgt, aber es gibt keine Anerkennung oder Sicherheit. Zensur, ungleiche Altersgrenzen für die Zustimmung und Regeln der \"öffentlichen Moral\" halten die Menschen vorsichtig und können immer noch zu Gewalt führen."
 law_lgbt_rights_3: "Rechtsschutz"
 law_lgbt_rights_3_desc: "Der Staat verbietet Diskriminierung und erkennt grundlegende Rechte an. Das Gemeinschaftsleben tritt öffentlich in Erscheinung, obwohl Gegenreaktionen aufflammen können und echter Fortschritt von weiterer Durchsetzung und kulturellem Fortschritt abhängt."

 ut_lgbt_same_sex_unions: "Gleichgeschlechtliche Partnerschaften"
 ut_lgbt_same_sex_unions_desc: "Gesetzliche Anerkennung gleichgeschlechtlicher Partnerschaften, die ähnliche Rechte und Pflichten wie heterosexuelle Ehen bieten."
 ut_lgbt_same_sex_marriage: "Gleichgeschlechtliche Ehe"
 ut_lgbt_same_sex_marriage_desc: "Vollständige rechtliche Anerkennung und Schutz für gleichgeschlechtliche Ehen, einschließlich Adoptionsrechte und steuerlicher Vorteile."
 ut_lgbt_sexual_self_determination: "Sexuelle Selbstbestimmung"
 ut_lgbt_sexual_self_determination_desc: "Gesetzliche Anerkennung des Rechts auf sexuelle Selbstbestimmung, einschließlich Schutz vor Diskriminierung aufgrund sexueller Orientierung und Geschlechtsidentität."

 law_international_trade: "Internationaler Handel"
 law_international_trade_desc: "Regelungen und Vereinbarungen, die den Handel zwischen Nationen regeln."


