 concept_ut_nd_democrat_core: "Demokratie"
 concept_ut_nd_democrat_core_desc: "#bold Ideologischer [concept_ut_nd_progress_points] Zuwachs#!\n- $ut_nd_democrat_progress_from_characters$\n- $ut_nd_democrat_progress_from_igs$\n- $ut_nd_democrat_progress_from_laws$\n\n#bold Verfügbare [concept_ut_nd_milestones]#! - Preview\nFreischaltbare Ideologien: [GetIdeology('ideology_liberal_democratic').GetName], [GetIdeology('ideology_reactionary_democratic').GetName], [GetIdeology('ideology_moralist_democratic').GetName], [GetIdeology('ideology_plutocratic_democratic').GetName], [GetIdeology('ideology_socialist_democratic').GetName], [GetIdeology('ideology_jingoist_democratic').GetName]\nFreischaltbare Modifikatoren: [GetStaticModifier('je_ut_new_dawn_democratic_power_bloc_mod').GetDesc], [GetStaticModifier('je_ut_new_dawn_democratic_fair_elections_mod').GetDesc]\n\n#bold Verfügbare [concept_ut_nd_abilities]#!\n - [GetDiplomaticActionType('ut_international_diplomatic_power_bloc_merge').GetName]\n - [GetArticleType('ut_democracy_article').GetNameNoIcon]\n - [GetLawType('ut_law_monarchy_democratic').GetName]\n\n#b Unlocks Modifier#!\n[GetStaticModifier('je_ut_new_dawn_democratic_mod').GetDesc]\n\n#b [concept_ut_nd_stance]#!\n$ut_nd_democratic_stance$\n\n#b [concept_ut_nd_path_to_utopia]#!\nStrengthen democratic institutions and create a just, free society where all citizens experience participation, dignity, and opportunity. Lead your people to a utopia based on equality, openness, and the will of the people.\n\n#i Development Status: Playable - Rough edges#!"
 ut_nd_democratic_stance: "Verbündet: [concept_ut_nd_democrat_core]\nNeutral: [concept_ut_nd_communist_core], [concept_ut_nd_autocrat_core]\nFeindlich: [concept_ut_nd_fascist_core]"

 concept_ut_nd_communist_core: "Kommunismus"
 concept_ut_nd_communist_core_desc: "#bold Ideologischer [concept_ut_nd_progress_points] Zuwachs#!\n- $ut_nd_communist_progress_from_characters$\n- $ut_nd_communist_progress_from_igs$\n- $ut_nd_communist_progress_from_laws$\n\n#bold Schaltet autoritäre [concept_ut_nd_milestones] frei#!:\n - Freischaltbare Ideologien: [GetIdeology('ideology_reactionary_communist').GetName], [GetIdeology('ideology_patriotic_communist_national').GetName]\n - Gesetzvarianten freischalten: [GetLawType('ut_law_council_presidium').GetName]\n - Freischaltbare Modifikatoren: [GetStaticModifier('je_ut_new_dawn_communist_one_block_mod').GetDesc]\n[GetStaticModifier('je_ut_communist_socialist_expansion_mod').GetDesc]\n\n#bold Demokratische [concept_ut_nd_milestones] freischalten#!:\n - Ideologien freischalten: [GetIdeology('ideology_plutocratic_communist').GetName], [GetIdeology('ideology_urbanist_power_base').GetName], [GetIdeology('ideology_patriotic_communist_international').GetName]\n - Gesetzesvarianten freischalten: [GetLawType('ut_law_international_council').GetName] \n - Modifikatoren freischalten: [GetStaticModifier('je_ut_new_dawn_communist_one_people_mod').GetDesc]\n\n#bold Verfügbare [concept_ut_nd_abilities]#!  - Preview\n - [GetDiplomaticActionType('ut_force_become_subject').GetName]\n - [GetArticleType('ut_communism_article').GetNameNoIcon] \n - [GetDiplomaticActionType('ut_international_diplomatic_power_bloc_merge').GetName]\n - [GetDiplomaticActionType('ut_humiliate_power_bloc_goal').GetName]\n\n#b Freigeschalteter Modifikator#!\n[GetStaticModifier('je_ut_new_dawn_communist_mod').GetDesc]\n\n#b [concept_ut_nd_stance]#!\n$ut_nd_communist_stance$\n\n#b [concept_ut_nd_path_to_utopia]#!\nBuild a classless society where all means of production are collectively owned. Lead your people to a utopia where equality and solidarity form the foundation of coexistence.\n\n#i Development Status: Playable - Almost done#!"
 ut_nd_communist_stance: "Verbündet: [concept_ut_nd_communist_core]\nNeutral: [concept_ut_nd_democrat_core], [concept_ut_nd_autocrat_core]\nFeindlich: [concept_ut_nd_fascist_core]"

 concept_ut_nd_path_to_utopia: "Pfad zur Utopie"
 concept_ut_nd_path_to_utopia_desc: "Wenn eine Ideologie erfolgreich den [concept_ut_new_dawn] Journal-Eintrag abschließt, kann sie ihren [concept_ut_nd_path_to_utopia] beginnen - jede Ideologie kommt mit dem gleichen Basis-Set an Fähigkeiten, gewürzten Fähigkeiten, gewürzten Modifikatoren und kann sogar ein [concept_ut_nd_utopia] aufweisen, das erreicht werden soll.\n\nEin [Concept('concept_humiliation', 'gedemütigtes')] Land wird wahrscheinlich seinen [concept_ut_nd_path_to_utopia] aufgeben und eine neue Ideologie wählen.\n\n#bold Basis [concept_ut_nd_abilities]:#!\n - [GetDiplomaticActionType('ut_influence_new_dawn_major_power').GetName]\n - [GetDiplomaticActionType('ut_fund_ideology').GetName]\n - [GetDiplomaticActionType('ut_fund_opposition').GetName]\n\n#b 'Neuer Aufbruch' ist in Arbeit#!\n#italic Hinweis zu den Statusnotizen:\ntbd (To Be Determined): Keine tatsächliche Arbeit geleistet\nwip (Work in Progress): Laufende Entwicklung, folgen Sie den Patchnotizen\nVorschau: Erste Version verfügbar für Feedback; unvollständig und nicht final\n\nIdeologien ohne Vorschau [concept_ut_nd_milestones] oder [concept_ut_nd_abilities] verfügen stattdessen über mehr statische Modifikatoren.\n\nStatusnotizen können unvollständig sein.\n\n#i Wenn ihr Project Utopia unterstützen möchtet - hinterlasst ein Like im Steam Workshop <3"

 concept_ut_nd_utopia: "Utopia"
 concept_ut_nd_utopia_desc: "Utopie ist eine imaginierte ideale Gesellschaft, in der es vollständige Gerechtigkeit, Harmonie und das Gedeihen der Menschen zur Perfektion gibt - sie ist ebenso sehr eine Aspiration wie eine inspirierende Vision."

 ut_utopia_enabled_on_game_started_loc_yes: "Project Utopia Status: aktiviert seit Spielstart."
 ut_utopia_enabled_on_game_started_loc_26_03_13_yes: "$ut_utopia_enabled_on_game_started_loc_yes$ Alle Inhalte verfügbar."
 ut_utopia_enabled_on_game_started_loc_no: "Spielstand vor dem 13. März gestartet oder Project Utopia wurde beim Spielstart nicht aktiviert.\n#bold Wichtig:#! Neue Bergbau-Ressourcen und Gesetze erfordern, dass Project Utopia seit Spielstart aktiviert ist."

