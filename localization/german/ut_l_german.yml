 new_dawn_phase_2_mod: "Neuer Aufbruch: Ideologie festigen"

 event_new_dawn.1.t: "Neuer Aufbruch"
 event_new_dawn.1.d: "Eine neue politische Welle hat unsere Nation erfasst, und wir müssen entscheiden, wie wir darauf reagieren. Werden wir den Wandel begrüßen oder ihm widerstehen? Die Zukunft unseres Landes steht auf dem Spiel."
 event_new_dawn.1.f: "Der Neue Aufbruch ist da, und mit ihm beginnt eine neue Ära des politischen Wandels. Wir müssen diese Gewässer sorgfältig navigieren und die Forderungen des Volkes mit den Bedürfnissen des Staates in Einklang bringen. Die Entscheidungen, die wir jetzt treffen, werden die Zukunft unserer Nation für kommende Generationen prägen."
 event_new_dawn.1.a: "Auf zum Neuen Aufbruch"

 event_new_dawn.2.a: "Grundlage für die Kernideologie schaffen"
 
 event_new_dawn.2.d.a: "Unsere Verbündeten in der autokratischen Fraktion haben rasch gehandelt, um die Macht zu sichern, unterstützt von wichtigen Institutionen. Der Übergang verläuft geordnet, wenn auch nicht ohne Widerstand."
 event_new_dawn.2.d.d: "Die demokratische Koalition hat mit einem starken Mandat das Ruder übernommen. Die Zivilgesellschaft ist energiegeladen, und die Öffentlichkeit scheint optimistisch - obwohl Herausforderungen bevorstehen."
 event_new_dawn.2.d.c: "Die Kommunisten haben die Kontrolle übernommen und radikale Veränderungen versprochen. Alte Strukturen werden demontiert, und das Volk wird aufgerufen, sich unter einer neuen Vision zu vereinen."
 event_new_dawn.2.d.f: "Der faschistische Block hat die Führung übernommen und eine neue Ära nationaler Stärke ausgerufen. Widerspruch wird rasch unterdrückt, und Ordnung wird durch Disziplin durchgesetzt."


 event_new_dawn.2.f.a: "Eine eiserne Faust stellt die Kontrolle wieder her, auch wenn die Freiheit darunter leiden mag."
 event_new_dawn.2.f.d: "Die Hoffnung wächst mit der Abstimmung - Wandel durch Konsens."
 event_new_dawn.2.f.c: "Eine Arbeiterrevolution formt den Staat neu."
 event_new_dawn.2.f.f: "Die Starken weisen den Weg in eine geläuterte Zukunft."


 event_new_dawn.3.t: "Marsch auf die Hauptstadt"
 event_new_dawn.3.a: "Sie sollen die Macht übernehmen"
 event_new_dawn.3.b: "Diese Ideologie muss unterdrückt werden"

 event_new_dawn.3.f.a: "Das Aufkommen einer unabhängigen autokratischen Kraft stört das politische Gleichgewicht. Die Machtübernahme war rasch und ließ wenig Raum für Opposition oder Verhandlung."
 event_new_dawn.3.f.c: "Unerwartete kommunistische Kräfte haben den Status quo gestürzt. Eine radikale Neuausrichtung ist im Gange und schockiert weite Teile des Establishments."
 event_new_dawn.3.f.d: "Ein demokratischer Aufstand ist erfolgreich und hat die herrschenden Eliten auf dem falschen Fuß erwischt. Die neue Führung verspricht Reformen und Transparenz."
 event_new_dawn.3.f.f: "Unser faschistischer Anführer marschiert auf unsere Hauptstadt - was sollen wir tun?"

 event_new_dawn.3.d.a: "Das Regime fiel, und die eiserne Faust rückte rasch nach."
 event_new_dawn.3.d.d: "Als die Proteste anschwollen und die Herrschenden ins Wanken gerieten, schlug die Demokratie danach Wurzeln."
 event_new_dawn.3.d.c: "Aus dem Chaos trat eine Vorhut hervor und nutzte den Moment, um einen neuen Arbeiterstaat einzuleiten."
 event_new_dawn.3.d.f: "Die Ordnung brach zusammen - nur Stärke konnte die Seele der Nation wiederherstellen."

 event_new_dawn.11.t: "Streitkräfte fordern Führungswechsel"
 event_new_dawn.11.f: "Hochrangige Militäroffiziere haben unter Berufung auf die Instabilität des Landes den Rücktritt der aktuellen Führung gefordert. Sie schlagen eine neue Galionsfigur vor, die besser mit ihren Interessen übereinstimmt."
 event_new_dawn.11.d: "Wenn die Generäle sprechen, hören selbst Präsidenten zu."

 event_new_dawn.democrat_leader: "Einen neuen demokratischen Anführer ernennen"
 event_new_dawn.autocrat_leader: "Eine autokratische Galionsfigur stärken"
 event_new_dawn.random_decision: "Das Ergebnis sich organisch entfalten lassen"
 event_new_dawn.suppress_random_decision: "Unbeabsichtigte Führungswechsel verhindern"

 event_new_dawn.30.t: "Dissidenten unterdrücken"
 event_new_dawn.30.d: "Eine wachsende Fraktion von Andersdenkenden bedroht die nationale Einheit. Die Regierung wägt ab, ob sie hart durchgreifen soll, um die Stabilität zu wahren."
 event_new_dawn.30.f: "Eine wachsende Fraktion von Andersdenkenden bedroht die nationale Einheit. Die Regierung wägt ab, ob sie hart durchgreifen soll, um die Stabilität zu wahren."
 event_new_dawn.30.o.self: "Wir werden keine Spaltung dulden. Handeln wir entschlossen."
 event_new_dawn.30_tt: "Wähle zwischen der deutlichen Reduzierung der Macht der oppositionellen Ideologiegruppe oder der Stärkung unserer Regierung zur Eindämmung von Radikalen."

