 ut_radical_feminism_leader: "Radikale Feministin"
 ut_radical_feminism_leader_desc: "Radikale Feministinnen setzen sich für Emanzipation ein und befürworten [GetIdeology('ideology_radical').GetName]-Reformen. Wahrscheinlicher bei [concept_ut_nd_communist_core]."
 ut_radical_feminism_leader_unlock_tt: "Schaltet [GetIdeology('ut_radical_feminism_leader').GetName] [concept_ideology] frei"
 ut_social_feminism_leader: "Sozial Feministin"
 ut_social_feminism_leader_desc: "Soziale Feministinnen setzen sich für Emanzipation ein und befürworten [GetIdeology('ideology_social_democrat').GetName]-Reformen. Wahrscheinlicher bei [concept_ut_nd_democrat_core] oder [concept_ut_nd_communist_core]."
