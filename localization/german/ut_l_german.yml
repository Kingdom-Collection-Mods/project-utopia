 SERVICE_WORKERS_QUALIFICATIONS_DESC: "Nur Bevölkerungsgruppen mit ausreichender [concept_literacy] und [concept_wealth] können zu #v $service_workers$#! werden. Das Potenzial steigt mit zunehmender [concept_literacy] und [concept_wealth]. #v $laborers$#! und #v $clerks$#! haben es besonders leicht, zu #v $service_workers$#! zu werden."
