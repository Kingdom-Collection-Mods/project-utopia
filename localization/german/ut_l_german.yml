 je_ut_new_dawn_fascist: "Faschismus"
 je_ut_new_dawn_fascist_reason: "Die Gesellschaft wurde neugeordnet. Nationale Identität und die Nation, stellen das Gemeinwohl über Einzelinteressen. Kritische Stimmen gelten als Gefahr, während Medien und Institutionen auf Linie gebracht werden.\n\nOb du diesen Kurs festigst und den Nationen deinen Willen aufzwingst oder ob der Hoffnung der Menschlichkeit zurück kommt, liegt nun bei dir. #italic - [Concept('concept_ut_nd_fascist_core', 'Faschistisch')]#!"

 je_ut_new_dawn_communist: "Kommunismus"
 je_ut_new_dawn_communist_reason: "Die Menschen fordern Gleichheit, Gerechtigkeit und das Ende der Klassen. Im ganzen Land bilden sich Arbeiterräte, Gewerkschaften gewinnen an Einfluss und Proteste für soziale Rechte füllen die Straßen.\n\nOb dieses Erwachen führt. \n #italic - [Concept('concept_ut_nd_communist_core', 'Kommunismus')] [concept_ut_nd_path_to_utopia]#!"
 je_ut_new_dawn_communist_complete_condition_tt: "Never (wip)"

