 ut_tech_preview_cheat_research: "Project Utopia: Technology Cheat"
 ut_tech_preview_cheat_research_desc: "Als Teil der technischen Vorschau kann man cheaten, um eine Menge Innovationen und [Concept('concept_ut_research_institute', 'Forschung')] zu erhalten."
 utopia_mod.2.t: "Technologischen Vorsprung sichern"
 utopia_mod.2.d: "Durch inoffizielle Kanäle erhält Ihre Verwaltung Zugang zu einem überwältigenden Zustrom von Innovationen. Obwohl alles andere als legitim, bietet dieser Shortcut einen Einblick in die Zukunft - eine Zukunft, die Sie nun mit unfairen Vorteilen gestalten können."
 utopia_mod.2.f: "Was ist Fortschritt, wenn nicht die Beherrschung der Zeit selbst? Während andere über Ethik und Gleichheit debattieren, haben wir den Schleier der Möglichkeiten durchbrochen. Mit diesem beispiellosen Anstieg an Innovationen überspringen wir Generationen langsamer, bürokratischer Entwicklung. Lassen Sie die Geschichte uns beurteilen - oder lassen Sie es keine Geschichte geben, nur die Brillanz von morgen, geschrieben in Schaltkreisen und Stahl, nicht in Tinte und Pergament. Utopia wird nicht gegeben. Es wird genommen."
 ut_tech_preview_cheat_disable_tt: "Deaktiviert den Cheat dauerhaft"
 ut_tech_preview_cheat_research_modifier: "Verbotene Technologien"

 ut_tech_preview_cheat_mining: "Project Utopia: Bergbau-Gebäude-Cheat" 
 ut_tech_preview_cheat_mining_desc: "Mod möglicherweise beim Spielstart nicht aktiviert - kann Bergbaugebäude ohne Platzierungsvoraussetzungen freischalten."
 ut_mining_cheat_enable_tt: "Schaltet [GetBuildingType('building_bauxite_mine_debug').GetName] und [GetBuildingType('building_rare_earths_mine_debug').GetName] für alle Länder #bold dauerhaft#! frei."
 utopia_mod.1.t: "$ut_tech_preview_cheat_mining$"
 utopia_mod.1.d: "$ut_tech_preview_cheat_mining_desc$"
 utopia_mod.1.f: "Die freigeschalteten Gebäude [GetBuildingType('building_bauxite_mine_debug').GetName] und [GetBuildingType('building_rare_earths_mine_debug').GetName] können überall platziert werden. Sie sind dafür gedacht, Project Utopia in einem laufenden Spielstand auszuprobieren. Das Mod ist dafür nicht ausbalanciert. Auf eigene Gefahr verwenden."

