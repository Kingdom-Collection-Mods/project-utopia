 ut_research_nuclear_power: "Kernenergie erforschen"
 ut_research_nuclear_power_desc: "Untersuche das Potenzial der Kernspaltung als leistungsstarke Energiequelle."
 ut_je_ut_research_nuclear_power: "Kernenergie"
 ut_je_ut_research_nuclear_power_reason: "Die Entdeckung der Kernspaltung öffnet die Tür zu einer neuen Ära der Energieproduktion. Was einst ein theoretisches Konzept war, wird Realität: kontrollierte nukleare Reaktionen, die immense Energiemengen freisetzen. Es geht nicht nur um die Energieerzeugung, sondern darum, das Atom selbst zu beherrschen.\nMit ausreichenden Investitionen können wir diese Revolution anführen - eine neue Energiequelle schaffen, die die Welt verändern wird."
 ut_je_ut_research_nuclear_power_goal: "Warten auf den Abschluss der #BOLD 4-Jahres#!-Forschungsphase (4 Jahre, wenn das Forschungsinstitut zu 100 % ausgelastet ist)"
 ut_research_nuclear_power_mod: "Kernenergie erforschen"
 ut_je_nuclear_power_plant_construction: "Bau eines Kernkraftwerks"
 ut_je_nuclear_power_plant_construction_reason: "Mit der erfolgreichen Erforschung der Kernenergie sind wir nun bereit, den nächsten Schritt zu gehen."
 ut_nuclear_power_plant_location: "Bau eines Kernkraftwerks"
 ut_nuclear_power_plant_location_desc: "Wählen Sie einen geeigneten Standort für den Bau des Kernkraftwerks aus."
 ut_je_nuclear_power_plant_construction_site: "Bauplatz für das Kernkraftwerk"
 ut_je_nuclear_power_plant_construction_site.success.d: "Der Standort für das Kernkraftwerk wurde erfolgreich ausgewählt."
 ut_je_nuclear_power_plant_construction_site.success.f: "Der Standort für das Kernkraftwerk wurde erfolgreich ausgewählt. Die Lage ist ideal für den Bau einer Anlage, die saubere und effiziente Energie für kommende Generationen bereitstellen wird."
 ut_nuclear_power_plant_construction_site_mod: "Aktiver Bauplatz für das Kernkraftwerk"

 ut_nuclear_event_critical_title: "Kernschmelze in [SCOPE.sState('nuclear_accident_state').GetName]"
 ut_nuclear_event_critical_desc: "Ein schwerer nuklearer Unfall hat sich im Kraftwerk ereignet."
 ut_nuclear_event_critical_flavor: "Die Folgen des Unfalls sind verheerend und betreffen sowohl die lokale Bevölkerung als auch die Umwelt von [SCOPE.sState('nuclear_accident_state').GetName] und darüber hinaus. Die freigesetzte Strahlung hat zu weiträumiger Kontamination geführt, Evakuierungen ausgelöst, Gesundheitskrisen verursacht und langfristige ökologische Schäden hinterlassen. Der Vorfall ist eine eindringliche Warnung vor den Risiken der Kernenergie und der Notwendigkeit strenger Sicherheitsmaßnahmen."
 ut_nuclear_event_minor_title: "Nuklearer Zwischenfall"
 ut_nuclear_event_minor_desc: "Ein kleiner Zwischenfall hat sich im Kernkraftwerk in [SCOPE.sState('nuclear_accident_state').GetName] ereignet."
 ut_nuclear_event_minor_flavor: "Der Vorfall wurde eingedämmt, er erinnert jedoch an die Risiken, die mit Kernenergie verbunden sind."

