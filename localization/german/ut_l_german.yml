 je_ut_new_dawn_democratic: "Demokratischer Aufbruch"
 je_ut_new_dawn_democratic_reason: "Das Volk fordert Mitsprache, Transparenz und freie Wahlen. Überall im Land bilden sich neue Parteien, Gewerkschaften gewinnen an Einfluss, und Proteste für Bürgerrechte füllen die Straßen.\n\nOb dieser Aufbruch in eine stabile Demokratie führt oder im Widerstand der alten Eliten erstickt, liegt nun in deiner Hand. Wirst du Reformen zulassen - oder versuchen, die alte Ordnung mit aller Macht zu bewahren? \n #italic - [Concept('concept_ut_nd_democrat_core', 'Demokratisch')] [concept_ut_nd_path_to_utopia]#!"
 je_ut_new_dawn_points_bar: "Fortschrittspunkte"
 je_ut_new_dawn_points_bar_desc: "Fortschrittspunkte: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/[SCOPE.ScriptValue('new_dawn_ideology_upper_bound')])"
 concept_ut_nd_progress_points: "Fortschrittspunkte"
 concept_ut_nd_progress_points_desc: "Fortschrittspunkte repräsentieren die Verbreitung einer Ideologie innerhalb deiner Nation. Sie werden durch verschiedene Aktionen verdient. Während des Aufstiegs eines Neuer Aufbruch messen sie, wie Interessengruppen und das politische Umfeld sich in Richtung der Annahme einer Ideologie bewegen. Nach der Übernahme eines Landes und dem Beginn des [concept_ut_nd_path_to_utopia] können Fortschrittspunkte für verschiedene Aktionen ausgegeben werden."

 concept_ut_new_dawn: "Neuer Aufbruch"
 concept_ut_new_dawn_desc: "Technologischer und kultureller Fortschritt läutet einen [concept_ut_new_dawn] des politischen Wandels ein. Der [concept_ut_nd_path_to_utopia] kann geebnet werden. Festige die Kernideologie deiner Nation. Die Ideologie bestimmt, in welche Richtung sich deine Nation entwickelt.\nWähle zwischen [concept_ut_nd_fascist_core], [concept_ut_nd_autocrat_core], [concept_ut_nd_democrat_core] und [concept_ut_nd_communist_core] [concept_ut_nd_path_to_utopia]."

 je_ut_new_dawn_democratic_complete_condition_tt: "Alle #v Aktionen#! des Journaleintrages sind abgeschlossen"

 je_ut_new_dawn_democratic_spirit: "Demokratischer Geist"
 je_ut_new_dawn_democratic_spirit_desc: "Ein neuer demokratischer Geist erfasst das Land, geleitet von Intellektuellen, die sich dem liberal-demokratischen Ideal verpflichtet fühlen. Der Weg nach vorne erfordert eine klare Absage an extremistische Ideologien in der Regierung."
 new_dawn_ideology_required_points_tt: "Erfordert mindestens #v [SCOPE.ScriptValue('new_dawn_ideology_required_points')] Fortschrittspunkte#!"
 new_dawn_ideology_required_points_spend_tt: "Verwende #r [SCOPE.ScriptValue('new_dawn_ideology_spend_points')]#! #v Fortschrittspunkte#!, um diesen Schritt zu aktivieren"
 new_dawn_ideology_upper_bound_tt: "Hat #v [SCOPE.ScriptValue('new_dawn_ideology_upper_bound')] Fortschrittspunkte#!"
 new_dawn_ideology_milestone_done_tt: "Hat den [Concept('concept_ut_nd_milestones', 'Meilenstein')] #v nicht#! abgeschlossen"
 new_dawn_ideology_previous_milestone_done_tt: "Hat #v den vorherigen [Concept('concept_ut_nd_milestones', 'Meilenstein')] abgeschlossen#!"

 je_ut_new_dawn_democratic_cultural_values: "Demokratische Kulturwerte"
 je_ut_new_dawn_democratic_cultural_values_desc: "Ein demokratisches Fundament kann nur auf kulturellen Werten gedeihen, die Pluralismus und individuelle Freiheiten respektieren. Führende Persönlichkeiten in Wirtschaft und Religion wenden sich einer demokratischeren Weltsicht zu."

 je_ut_new_dawn_democratic_power_bloc: "Demokratischer Machtblock"
 je_ut_new_dawn_democratic_power_bloc_desc: "Die Bildung eines demokratischen Machtblocks sichert Einfluss in der internationalen Ordnung und schützt vor hegemonialen Identitäten. Nur wer unabhängig und souverän bleibt, kann demokratische Ideale verteidigen."
 je_ut_new_dawn_democratic_power_bloc_tt: "Die Nation formt oder verstärkt einen Machtblock, der auf demokratischen Prinzipien basiert"
 je_ut_new_dawn_democratic_power_bloc_mod: "Demokratischer Machtblock"

 je_ut_new_dawn_democratic_fair_elections: "Faire Wahlen"
 je_ut_new_dawn_democratic_fair_elections_desc: "Allgemeines Wahlrecht bildet das Rückgrat einer gerechten Gesellschaft. Die Institutionalisierung fairer Wahlen stärkt das Vertrauen der Bevölkerung in die Demokratie."
 je_ut_new_dawn_democratic_fair_elections_tt: "Stärkt die Legitimität des politischen Systems durch transparente und gerechte Wahlen"
 je_ut_new_dawn_democratic_fair_elections_mod: "Faire Wahlen"
 je_ut_new_dawn_democratic_fair_elections_trigger_tt: "Hat [GetLawType('law_universal_suffrage').GetName] seit mindestens #bold 20 Jahren#! nach Abschluss des [concept_ut_nd_milestones] #bold $je_ut_new_dawn_democratic_spirit$#! (Aktuelle Jahre: [THIS.GetCountry.MakeScope.Var('je_ut_new_dawn_democratic_fair_elections_trigger_var').GetValue])"

 je_ut_new_dawn_democratic_final: "Utopia"
 je_ut_new_dawn_democratic_final_desc: "Der Höhepunkt demokratischer Ideale und Praktiken, der zu einer harmonischen und gerechten Gesellschaft führt."

 je_ut_new_dawn_autocratic: "Autokratisches System"
 je_ut_new_dawn_autocratic_reason: "Die Nation verlangt nach Ordnung, Stabilität und starker Führung. \n #italic - [Concept('concept_ut_nd_autocrat_core', 'Autokratien')] haben keinen [concept_ut_nd_path_to_utopia]#!"
 je_ut_new_dawn_autocratic_complete_condition_tt: "Es gibt keine Autokratische Utopie, der Eintrag kann nicht abgeschlossen werden. Stattdessen gibt es wiederholbare Aktionen."

 je_ut_new_dawn_emergency_powers: "Notstandsbefugnisse"
 je_ut_new_dawn_emergency_powers_desc: "In Zeiten der Krise muss der Staat entschlossen handeln. Notstandsbefugnisse ermöglichen eine schnelle Reaktion auf Bedrohungen und Herausforderungen, bergen jedoch auch das Risiko, demokratische Institutionen zu untergraben."
 je_ut_new_dawn_emergency_powers_mod: "$je_ut_new_dawn_emergency_powers$"
 je_ut_new_dawn_strengthen_power: "Macht stärken"
 je_ut_new_dawn_strengthen_power_desc: "Um Ordnung und Stabilität aufrechtzuerhalten, muss der Staat seine Macht stärken. Dies kann durch verschiedene Mittel erreicht werden, einschließlich militärischem Aufbau, Propaganda und Unterdrückung von Dissens."
 je_ut_new_dawn_strengthen_power_mod: "$je_ut_new_dawn_strengthen_power$"
 je_ut_new_dawn_border_dispute: "Grenzkonflikt"
 je_ut_new_dawn_border_dispute_desc: "Grenzkonflikte können zu Spannungen und Konflikten zwischen Nationen führen. Es ist wichtig, diese Konflikte friedlich und diplomatisch zu lösen, aber manchmal kann militärisches Handeln notwendig sein, um nationale Interessen zu schützen."
 je_ut_new_dawn_border_dispute_mod: "$je_ut_new_dawn_border_dispute$"
 je_ut_new_dawn_suppress_dissidents: "Dissidenten unterdrücken"
 je_ut_new_dawn_suppress_dissidents_desc: "Dissens kann die Stabilität des Staates untergraben und die nationale Sicherheit bedrohen. Die Unterdrückung von Dissens ist eine notwendige Maßnahme, um Ordnung aufrechtzuerhalten und die Nation vor internen Bedrohungen zu schützen."
 je_ut_new_dawn_suppress_dissidents_mod: "$je_ut_new_dawn_suppress_dissidents$"
 
 je_ut_new_dawn_outlaw_communists: "Kommunisten verbieten"
 je_ut_new_dawn_outlaw_communists_desc: "Linke Bewegungen bekämpfen und kommunistische Parteien verbieten.\n\n#italic Historischer Kontext:\nAm 28. Februar 1933 verabschiedeten die Nazis nach dem Reichstagsbrand die Reichstagsbrandverordnung, die Bürgerrechte aussetzte und die Verhaftung Tausender Kommunisten ermöglichte. Die KPD (Kommunistische Partei Deutschlands) wurde bald verboten - der erste Schritt zur Zerschlagung der politischen Opposition. Vier Monate später folgte das Verbot der SPD (Sozialdemokratische Partei Deutschlands), und einen Monat darauf wurden alle Parteien verboten - die Demokratie wurde zerstört.\n\nDer Totalitätsanspruch ist eine Dimension des Faschismus.#!"
 je_ut_new_dawn_form_paramilitary_groups: "Paramilitärische Gruppen"
 je_ut_new_dawn_form_paramilitary_groups_desc: "Inoffizielle militärische Organisationen zur Durchsetzung der Parteiherrschaft gründen.\n\n#italic Historischer Kontext:\nDie Sturmabteilung, seit den 1920er Jahren aktiv, wuchs Anfang der 1930er Jahre zu einer mächtigen paramiliitärischen Kraft heran, die Wähler einschüchterte und Oppositionstreffen störte. Am 30. Juni 1934, in der Nacht der langen Messer, säuberte Hitler die SA-Führung, um seine Macht zu festigen, und stärkte die ideologisch geprägtere Schutzstaffel.\n\nEine am Militär orientierte Parteiorganisation ist eine Dimension des Faschismus.#!"
 je_ut_new_dawn_conformity: "Gleichschaltung"
 je_ut_new_dawn_conformity_desc: "Strikte gesellschaftliche Ausrichtung an den Idealen des Staates durchsetzen.\n\n#italic Historischer Kontext:\nAb 1933 setzten die Nationalsozialisten die Gleichschaltung um - einen Prozess der Angleichung aller gesellschaftlichen Bereiche, darunter Medien, Bildung, Kultur und Religion, an die NS-Ideologie. Unabhängige Gewerkschaften wurden am 2. Mai 1933 verboten und durch die staatlich geführte Deutsche Arbeitsfront ersetzt.\n\nEin totalitäres hierarchiches Geslleschaftsmodell ist eine Dimension des Faschismus.#!"
 je_ut_new_dawn_unite_heritage: "Einheitliches Volk"
 je_ut_new_dawn_unite_heritage_desc: "Eine gemeinsame nationale Identität auf der Grundlage kultureller Mythen und Geschichte schaffen.\n\n#italic Historischer Kontext:\nDas NS-Regime förderte eine mythische Vision der germanischen Geschichte durch Organisationen wie das Ahnenerbe (gegründet 1935), das pseudowissenschaftliche Rassentheorien verbreitete. NS-Bildung und Propaganda verherrlichten eine vermeintliche arische Vergangenheit, um die Bevölkerung unter einer ausgrenzenden, ethnonationalistischen Identität zu vereinen.\n\nEine kulturstiftende irrationale weltliche Ersatzreligion ist eine Dimension des Faschismus.#!"
 je_ut_new_dawn_unite_heritage_trigger_tt: "Todo"
 je_ut_new_dawn_volksgemeinschaft: "Wir - die Anderen"
 je_ut_new_dawn_volksgemeinschaft_desc: "Eine rassisch definierte Volksgemeinschaft aufbauen, die Außenseiter ausschließt.\n\n#italic Historischer Kontext:\nDas Konzept der Volksgemeinschaft wurde ab 1933 genutzt, um die Einheit unter 'rassisch reinen' Deutschen zu fördern. Es schloss Juden, Sinti und Roma, Menschen mit Behinderungen und andere aus - und legte damit den Grundstein für die Nürnberger Gesetze von 1935, die Antisemitismus legalisierten und rassische Segregation institutionalisierten.\n\nDiese Ideologie bereitete den Weg für die systematische Ausgrenzung, die im Holocaust gipfelte, in dem über sechs Millionen Juden sowie andere marginalisierte Gruppen in einem staatlich geplanten Völkermord ermordet wurden.#!"
 je_ut_new_dawn_expansionism: "Expansionismus"
 je_ut_new_dawn_expansionism_desc: "Territoriales Wachstum für nationalen Ruhm und Lebensraum anstreben.\n\n#italic Historischer Kontext:\nGetrieben von der Ideologie des Lebensraums annektierte NS-Deutschland im März 1938 Österreich (Anschluss), übernahm im September 1938 das Sudetenland und überfiel am 1. September 1939 Polen, was den Zweiten Weltkrieg auslöste. Expansion war ein zentrales Element der nationalsozialistischen Außenpolitik mit dem Ziel, Osteuropa zu erobern und seine Bevölkerung zu vertreiben.\n\nDie faschistische Ideologie führte in den Zweiten Weltkrieg, der weltweit über 60 Millionen Menschenleben forderte.#!"
 je_ut_new_dawn_fascist_final_tt: "[concept_ut_nd_fascist_final_context]: There exists only [ROOT.GetCountry.GetName]"
 concept_ut_nd_fascist_final_context: "Tausendjähriges Reich"
 concept_ut_nd_fascist_final_context_desc: "Die Errichtung einer dauerhaften faschistischen Ordnung unter einer einzigen Ideologie und Rasse.\n\n#italic Historischer Kontext:\nDas NS-Regime strebte ein „Tausendjähriges Reich“ an - ein totalitäres Imperium unter der Führung einer einzigen Partei, vereint unter einer rassistisch definierten Ideologie. Diese Vision trieb eine unerbittliche Militarisierung, Propaganda und Völkermord voran, mit dem Ziel, die Welt durch dauerhafte Herrschaft neu zu gestalten. Obwohl es nur 12 Jahre (1933-1945) bestand, hinterließen die Handlungen des Regimes katastrophale globale Folgen und dienen bis heute als Warnung davor.#!"
 je_ut_new_dawn_fascist_complete_condition_tt: "Alle [concept_ut_nd_milestones] abgeschlossen"
 concept_ut_nd_milestones: "Meilensteine" 
 concept_ut_nd_milestones_desc: "Meilensteine sind einmalige Aktionen mit bestimmten Vorraussetzungen. Alle Ideologien (außer Autokratie) haben einzigartige Pfade von Meilensteinen, die unterschiedliche Aktionen erfordern und verschiedene Effekte auf den [concept_ut_nd_path_to_utopia] bieten. \n\n #i Inspiriert von der Geschichte #!"
 concept_ut_nd_abilities: "Fähigkeiten"
 concept_ut_nd_abilities_desc: "Einmalige oder wiederholbare Fähigkeiten, die bedeutende Effekte bieten. Jede Ideologie hat einen Basissatz und einzigartige Fähigkeiten, die unterschiedliche Aktionen erfordern und verschiedene Effekte bieten - kosten normalerweise [concept_ut_nd_progress_points]."

