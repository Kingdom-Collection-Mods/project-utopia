#Core Ideology concepts

 concept_ut_nd_fascist_core: "Faschismus"
 concept_ut_nd_fascist_core_desc: "#bold Ideologischer [concept_ut_nd_progress_points] Zuwachs#!\n- $ut_nd_fascist_progress_from_characters$\n- $ut_nd_fascist_progress_from_igs$\n- $ut_nd_fascist_progress_from_laws$\n\n#bold Verfügbare [concept_ut_nd_milestones]#! - tbd\n\n#bold Verfügbare [concept_ut_nd_abilities]#!\n - [GetDiplomaticPlayType('dp_ut_fascist_annex_war').GetName] (Niedrigstufigere Nation)\n - [GetDiplomaticActionType('ut_force_regime_change').GetName]\n\n#b [concept_ut_nd_focus] Modifikator#!\n[GetStaticModifier('je_ut_new_dawn_fascist_focus').GetDesc]\n\n#b Freigeschalteter Modifikator#!\n[GetStaticModifier('je_ut_new_dawn_fascist_mod').GetDesc]\n\n#b [concept_ut_nd_stance]#!\n$ut_nd_fascist_stance$\n\n#b [concept_ut_nd_path_to_utopia]#!\nTransformiere dein Volk in eine ... Utopie, durch blinden Gehorsam, Militarismus und die rücksichtslose Unterwerfung aller, die als 'anders' gelten. Erobere die Welt. Schaffe Wohlstand und Einheit für wenige, auf Kosten der Freiheit und Würde aller anderen.\n\n#i Entwicklungsstatus: Nicht spielbar - Vorschau#!"
 ut_nd_fascist_stance: "Verbündet: [concept_ut_nd_autocrat_core], [concept_ut_nd_fascist_core]\nFeindlich: [concept_ut_nd_democrat_core], [concept_ut_nd_communist_core]"


 concept_ut_nd_autocrat_core: "Autokratie"
 concept_ut_nd_autocrat_core_desc: "#bold Ideologischer [concept_ut_nd_progress_points] Zuwachs#!\n- $ut_nd_autocrat_progress_from_characters$\n- $ut_nd_autocrat_progress_from_igs$\n- $ut_nd_autocrat_progress_from_laws$\n\n#bold Verfügbare [concept_ut_nd_abilities]#! - Preview\n - [GetLawType('ut_law_monarchy_autocratic').GetName]\n - [GetLawType('ut_law_monarchy_corporate_state').GetName]\n - #p Edicts:#! [GetStaticModifier('je_ut_new_dawn_emergency_powers_mod').GetName], [GetStaticModifier('je_ut_new_dawn_strengthen_power_mod').GetName], [GetStaticModifier('je_ut_new_dawn_border_dispute_mod').GetName],  [GetStaticModifier('je_ut_new_dawn_suppress_dissidents_mod').GetName]\n\n#b Freigeschalteter Modifikator#!\n[GetStaticModifier('je_ut_new_dawn_autocratic_mod').GetDesc]\n\n#b [concept_ut_nd_stance]#!\n $ut_nd_autocratic_stance$\n\n#b [concept_ut_nd_path_to_utopia]#!\nKeine."
