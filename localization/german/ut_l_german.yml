 service_workers: "@service_workers! $service_workers_no_icon$"
 service_workers_desc: "Arbeitende in urbanen Dienstleistungssektoren wie Gastgewerbe, Einzelhandel und Transport. Sie bilden einen wesentlichen Teil der modernen Wirtschaft und repräsentieren eine vielfältige, dynamische Arbeitskraft. Ohne sie gibt es keine Urbanisten. Politisch haben sie eine Tendenz zu den Urbanisten."
